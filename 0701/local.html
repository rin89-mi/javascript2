<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <p>次のオブジェクトprofileを ocalStorage に保存し、その後取り出してnickname を console.log() で表示してください。JSON.stringify() と JSON.parse()
        を使用してください。JavaScriptのコードのみを入力してください。</p>
    <script>
        const profile = {
            nickname: 'Taro',
            level: 5
        };

        localStorage.setItem('profile', JSON.stringify(profile));

        const name = JSON.parse(localStorage.getItem('profile'));
        console.log(name.nickname);

    </script>
</body>

</html>

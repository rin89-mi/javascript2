<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>プレゼントするならどの花？</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <h1>プレゼントするならどの花？</h1>
    <div id="voteList">
        <div class="card" data-id="1">
            <div class="candidate-image">
                <img src="./images/bara.jpeg" alt="バラ">
            </div>
            <div class="candidate-name">バラ</div>
            <div class="votes">0票</div>
            <div class="progress-bar">
                <div class="bar"></div>
            </div>
            <button class="vote-btn">投票する</button>
        </div>
        <div class="card" data-id="2">
            <div class="candidate-image">
                <img src="./images/gabera.jpg" alt="ガーベラ">
            </div>
            <div class="candidate-name">ガーベラ</div>
            <div class="votes">0票</div>
            <div class="progress-bar">
                <div class="bar"></div>
            </div>
            <button class="vote-btn">投票する</button>
        </div>
        <div class="card" data-id="3">
            <div class="candidate-image">
                <img src="./images/hasu.jpg" alt="蓮">
            </div>
            <div class="candidate-name">蓮</div>
            <div class="votes">0票</div>
            <div class="progress-bar">
                <div class="bar"></div>
            </div>
            <button class="vote-btn">投票する</button>
        </div>
    </div>
    <script type="module" src="./js/main.js"></script>
</body>

</html>
